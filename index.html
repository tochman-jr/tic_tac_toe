<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taddes Tic Tac Toe Game</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <!-- menu screen (AI/local/online selection) -->
    <div id="menuScreen" class="container">
        <h1>Multiplayer Tic Tac Toe</h1>
        
        <!-- Main Menu -->
        <div id="mainMenu" class="menu">
            <h2>Choose Game Mode</h2>
            <button id="aiBtn" class="menu-btn">🎯 Play vs AI</button>
            <button id="localBtn" class="menu-btn">👥 Play Local (Same Device)</button>
            <button id="onlineBtn" class="menu-btn">🌐 Play Online</button>
        </div>

        <!-- Online Menu -->
        <div id="onlineMenu" class="menu hidden">
            <h2>Online Multiplayer</h2>
            <button id="createRoomBtn" class="menu-btn">Create Room</button>
            <div class="join-section">
                <input type="text" id="roomCodeInput" placeholder="Enter Room Code" maxlength="6" class="room-input">
                <button id="joinRoomBtn" class="menu-btn">Join Room</button>
            </div>
            <button id="backToMainBtn" class="back-btn">← Back to Main Menu</button>
        </div>
    </div>

    <!-- game screen (board and controls) -->
    <div id="gameScreen" class="container hidden">
        <h1>Multiplayer Tic Tac Toe</h1>
        <div id="game" class="game">
            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>

            <div class="status" id="status">Choose a game mode to start!</div>
            
            <div class="game-controls">
                <button class="reset-btn" id="resetBtn">New Game</button>
                <button class="back-btn" id="backToMenuBtn">← Back to Menu</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
